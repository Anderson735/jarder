<div class="page-center">
  <div class="login-wrap">
    <div class="login-brand">Jarder</div>
    <p class="login-sub">Plataforma de capacitación corporativa</p>

    @if (auth.isAuthenticated()) {
      <div class="card card-padded" style="text-align:center">
        <p style="margin-bottom:1rem">Sesión activa como <strong>{{ auth.user()!.displayName }}</strong></p>
        <a class="btn-primary" style="display:inline-block;padding:9px 24px;border-radius:var(--j-r-md);color:#e8e7f4;text-decoration:none" [routerLink]="getPanel(auth.user()!.role)">Ir al panel</a>
      </div>
    } @else {
      <div class="card card-padded">
        <div class="form-group">
          <label class="form-label">Correo electrónico</label>
          <input type="email" [(ngModel)]="email" name="email" placeholder="correo@empresa.com" />
        </div>
        <div class="form-group">
          <label class="form-label">Contraseña</label>
          <input type="password" [(ngModel)]="password" name="password" placeholder="••••••••" />
        </div>
        @if (errorMsg) {
          <p class="form-error" style="margin-bottom:0.75rem">{{ errorMsg }}</p>
        }
        <button class="btn-primary" style="width:100%" [disabled]="loading" (click)="submit()">
          {{ loading ? 'Verificando...' : 'Entrar' }}
        </button>
      </div>
      <div class="login-hints">
        <span class="badge badge-gray">super@jarder.com</span>
        <span class="badge badge-gray">admin@empresa.com</span>
        <span class="badge badge-gray">worker@empresa.com</span>
      </div>
    }
  </div>
</div>
