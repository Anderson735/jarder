<div class="page">
  <div class="card">
    <h1>Jarder Academia</h1>
    <p class="lead">Plataforma tipo Udemy: administración de cursos y aprendizaje para tu empresa.</p>

    @if (auth.isAuthenticated()) {
      <p class="hint">Ya tienes sesión como <strong>{{ auth.user()!.displayName }}</strong>.</p>
      <div class="actions">
        <a class="btn primary" [routerLink]="auth.isAdmin() ? '/admin' : '/worker'">Ir al panel</a>
        <button type="button" class="btn ghost" (click)="logout()">Cerrar sesión</button>
      </div>
    } @else {
      <label class="field">
        <span>Nombre para mostrar</span>
        <input [(ngModel)]="displayName" name="displayName" placeholder="Ej. María García" />
      </label>
      <p class="hint">Acceso demo sin backend: elige tu rol.</p>
      <div class="actions stack">
        <button type="button" class="btn primary" (click)="enter('admin')">Entrar como administrador</button>
        <button type="button" class="btn secondary" (click)="enter('worker')">Entrar como trabajador</button>
      </div>
    }
  </div>
</div>
