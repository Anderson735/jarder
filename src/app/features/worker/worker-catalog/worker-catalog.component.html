<div>
  <h2 style="margin-bottom:1.5rem">Catálogo de cursos</h2>
  <div class="catalog-grid">
    @for (course of courses(); track course.id) {
      <div class="course-card" [routerLink]="['/worker/learn', course.id]">
        <div class="course-thumb">
          <span class="course-initial">{{ course.title.charAt(0) }}</span>
        </div>
        <div class="course-body">
          <div class="course-title">{{ course.title }}</div>
          <div class="course-meta">{{ course.sessions.length }} sesiones</div>
        </div>
      </div>
    }
    @if (courses().length === 0) {
      <p class="empty-state">No hay cursos disponibles.</p>
    }
  </div>
</div>
